name: CI Pipeline

on:
  push:
    branches-ignore:
      - main

jobs:
  ci-checks:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install dependencies
        run: pip install pylint
      - name: Run Pylint
        run: pylint *.py
      - name: Build Docker image
        run: docker build -t my-app:${{ github.sha }} .
