name: CI
on:
  push:
    branches-ignore:
      - main
jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'
      - name: Install Pylint
        run: pip install pylint
      - name: Run Pylint
        run: pylint *.py
      - name: Build Docker Image
        run: docker build -t my-app:${{ github.sha }} .
