name: CI

on:
  push:
    branches-ignore:
      - 'main'

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Pylint
        run: pip install pylint

      - name: Run Pylint
        run: pylint *.py

      - name: Build Docker Image
        run: docker build . -t my-app:test
