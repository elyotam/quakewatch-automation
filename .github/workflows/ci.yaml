name: CI

on:
  push:
    branches-ignore:
      - main

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.9'

      - name: Install Pylint
        run: |
          python -m pip install --upgrade pip
          pip install pylint

      - name: Run Pylint
        run: |
          # מונע מהפייפליין לקרוס אם אין קבצי פייתון
          find . -name "*.py" -exec pylint {} + || echo "No python files found, skipping lint."

      - name: Test Docker Build
        run: |
          docker build . -t test-image:latest
