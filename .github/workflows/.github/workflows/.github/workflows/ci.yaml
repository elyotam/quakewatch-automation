name: CI

on:
  push:
    branches-ignore:
      - main

jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Install Pylint
        run: pip install pylint
      - name: Run Pylint
        run: pylint *.py
      - name: Build Docker
        run: docker build . -t my-app
